  name: Fetch WIN System connection log
  
  on:
    schedule:
      - cron: '7,17,27,37,47,57 * * * *'
    workflow_dispatch:

  concurrency:
    group: fetch-connections
    cancel-in-progress: false

  jobs:
    fetch-and-upload:
      runs-on: ubuntu-latest
      timeout-minutes: 5

      steps:
        - name: Fetch + upload connections.txt
          env:
            URL_USER: ${{ secrets.URL_USER }}
            URL_PASS: ${{ secrets.URL_PASS }}
            LOG_URL:  ${{ secrets.LOG_URL }}
            FTP_HOST: ${{ secrets.FTP_HOST }}
            FTP_USER: ${{ secrets.FTP_USER }}
            FTP_PASS: ${{ secrets.FTP_PASS }}
            FTP_PATH: logs/connections.txt
          run: |
            set +e
            curl --fail --silent --show-error \
                 --connect-timeout 10 --max-time 60 \
                 --retry 3 --retry-delay 5 --retry-all-errors \
                 --user-agent "Mozilla/5.0" \
                 --user "$URL_USER:$URL_PASS" \
                 --output connections.txt "$LOG_URL"
            rc=$?
            set -e

            if [ "$rc" -eq 28 ]; then
              echo "::warning::Source timed out after retries. Skipping upload; next cron will retry."
              exit 0
            fi
            if [ "$rc" -ne 0 ]; then
              echo "::error::curl failed with exit $rc"
              exit 1
            fi
  
            lines=$(wc -l < connections.txt)
            bytes=$(wc -c < connections.txt)
            echo "Fetched $lines lines / $bytes bytes"

            if [ "$bytes" -lt 100 ]; then
              echo "::error::Suspiciously small payload — aborting upload."
              head -c 500 connections.txt
              exit 1
            fi
  
            curl --fail --silent --show-error \
                 --max-time 60 --ssl-reqd --insecure \
                 --user "$FTP_USER:$FTP_PASS" \
                 --upload-file connections.txt \
                 "ftp://$FTP_HOST/$FTP_PATH"
            echo "Uploaded to ftp://$FTP_HOST/$FTP_PATH"
